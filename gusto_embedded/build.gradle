// of string where each string value is an additional line in the block) in gen.yaml.
////////////////////////////////////////////////////////////////////////////////////////////

plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
    id 'maven-publish'
    id 'signing'
}

compileJava.options.encoding = "UTF-8"
compileJava.options.compilerArgs += '-Xlint:unchecked'
compileTestJava.options.encoding = "UTF-8"

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
    withSourcesJar()
    withJavadocJar()
}

model {
    tasks.generatePomFileForMavenPublication {
        destination = file("$buildDir/pom.xml")
    }
}

version = "${version}"
group = "${groupId}"

jar {
    dependsOn(":generatePomFileForMavenPublication")

    into("META-INF/maven/com.gusto/embedded-api") {
        from("$buildDir/pom.xml")
    }
}

javadoc {
    options.encoding = "UTF-8"

    if(JavaVersion.current().isJava9Compatible()) {
        options.addBooleanOption('html5', true)
    }
    options.addStringOption('Xdoclint:none', '-quiet')
}

tasks.withType(Javadoc) {
  failOnError false
  options.addStringOption('Xdoclint:none', '-quiet')
}

sourcesJar {
    archiveBaseName = "${artifactId}"
}

javadocJar {
    archiveBaseName = "${artifactId}"
}


publishing {
    repositories {
        maven {
            name = "GitHubPackages"
            url = "https://maven.pkg.github.com/Mission-Critical-SaaS/gusto-java-client"
            credentials {
                username = project.findProperty("gpr.user") ?: System.getenv("USERNAME")
                password = project.findProperty("gpr.key") ?: System.getenv("TOKEN")
            }
        }
    }

    publications {
        maven(MavenPublication) {
            // note that properties can't yet be used below!
            // https://github.com/gradle/gradle/issues/18619
            groupId = "com.gusto"
            artifactId = "embedded-api"
            version = "0.2.2"

            from components.java

            pom {
                name = 'Gusto Embedded Java SDK'
                description = 'SDK enabling Java developers to easily integrate with the Gusto Embedded API.'
                url = 'https://github.com/Mission-Critical-SaaS/gusto-java-client'
                scm {
                    url = 'https://github.com/Mission-Critical-SaaS/gusto-java-client'
                    connection = 'scm:git:https://github.com/Mission-Critical-SaaS/gusto-java-client.git'
                }
                licenses {
                    license {
                        name = 'The MIT License (MIT)'
                        url = 'https://mit-license.org/'
                    }
                }
                developers {
                    developer {
                        name = 'Mission Critical SaaS'
                        organization = 'Mission Critical SaaS'
                        email = 'info@mission-critical-saas.com'
                    }
                }
                organization {
                    name = 'Mission Critical SaaS'
                    url = 'https://mission-critical-saas.com'
                }
            }
        }
    }
}

if (!project.hasProperty('skip.signing')) {
    signing {
        def signingKey = findProperty("signingKey")
        def signingPassphrase = findProperty("signingPassphrase")
        useInMemoryPgpKeys(signingKey, signingPassphrase)
        sign publishing.publications.maven
    }
}



dependencies {
    api 'com.fasterxml.jackson.core:jackson-annotations:2.18.2'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.18.2'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.18.2'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jdk8:2.18.2'
    api('org.openapitools:jackson-databind-nullable:0.2.6') {exclude group: 'com.fasterxml.jackson.core', module: 'jackson-databind'}
    implementation 'commons-io:commons-io:2.18.0'
}

apply from: 'build-extras.gradle'
